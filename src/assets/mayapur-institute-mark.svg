<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" role="img" aria-labelledby="title desc">
  <title id="title">Mayapur Institute mark</title>
  <desc id="desc">Stylized gold emblem inspired by the provided Mayapur Institute image.</desc>
  <defs>
    <radialGradient id="sun" cx="50%" cy="42%" r="52%">
      <stop offset="0%" stop-color="#fff7cf"/>
      <stop offset="68%" stop-color="#f6e6a7"/>
      <stop offset="100%" stop-color="#ecd48d"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e7c870"/>
      <stop offset="50%" stop-color="#b58a26"/>
      <stop offset="100%" stop-color="#f2df9d"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <path id="topArc" d="M92 290 A170 170 0 0 1 428 290"/>
    <path id="bottomArc" d="M392 333 A146 146 0 0 1 128 333"/>
  </defs>

  <circle cx="260" cy="246" r="124" fill="url(#sun)" opacity="0.95" filter="url(#softGlow)"/>
  <circle cx="260" cy="246" r="168" fill="none" stroke="url(#gold)" stroke-width="6" opacity="0.95"/>

  <text font-family="Cormorant Garamond, Georgia, serif" font-size="30" letter-spacing="2.2" fill="url(#gold)" font-weight="700">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">MAYAPUR INSTITUTE</textPath>
  </text>

  <text font-family="Cormorant Garamond, Georgia, serif" font-size="26" letter-spacing="1.8" fill="url(#gold)" font-weight="700">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">SRI GURU SEVA</textPath>
  </text>

  <g fill="#b89339" opacity="0.92">
    <circle cx="253" cy="208" r="31"/>
    <path d="M204 313c9-41 23-72 49-87 8-5 17-8 26-8 15 0 31 8 42 23 12 16 19 37 25 72l-24 11c-8-37-14-58-24-70-7-9-14-13-22-13-5 0-11 2-16 6-17 11-29 35-38 75z"/>
    <path d="M233 184c-10 12-18 26-22 44l21 6c6-22 12-32 22-44z"/>
    <path d="M292 199c28 15 47 43 59 82l-21 8c-10-36-27-61-49-74z"/>
    <path d="M201 298c34 12 76 18 119 18 16 0 31-1 47-3l-4 20c-15 2-30 3-44 3-43 0-83-6-117-17z" opacity="0.65"/>
  </g>

  <g transform="translate(126 287)">
    <path d="M18 63c45-18 94-18 139 0v44c-45-18-94-18-139 0z" fill="#d3ae5d" stroke="#b58a26" stroke-width="4"/>
    <path d="M157 63c26-10 54-15 84-15v44c-29 0-58 5-84 15z" fill="#dfc175" stroke="#b58a26" stroke-width="4"/>
    <path d="M18 63c-26-10-54-15-84-15v44c29 0 58 5 84 15z" fill="#dfc175" stroke="#b58a26" stroke-width="4"/>
    <path d="M18 63c45-18 94-18 139 0" fill="none" stroke="#f6e3af" stroke-width="3" opacity="0.8"/>
    <ellipse cx="87.5" cy="108" rx="15" ry="7" fill="#a17c27"/>
  </g>
</svg>
